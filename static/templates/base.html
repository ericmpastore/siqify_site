{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <!-- <link rel="stylesheet" type="text/css" href="{% static 'css/styles.css' %}" /> -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <nav class="navbar navbar-dark bg-dark">
            
            <div class="ms-auto">
                {% if user.is_authenticated %}
                <a href="{% url 'home' %}" class="btn btn-outline-light me-1">Home</a>
                <form method="POST" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light me-1">Logout</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light me-1">Login</a>
                {% endif %}
            </div>

        </nav>
        <!--block area to inject content, EPastore 05/23/2026-->
        <div class="my-5 text-center container">
            {% block content %}
            {% endblock %}
        </div>
        
    </body>
</html>
